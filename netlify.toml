# Netlify config for the Expo web build.
# Used when you connect this repo to Netlify (auto-deploy on push). For the
# drag-and-drop "Netlify Drop" path you don't need this file.
#
# IMPORTANT: a CI build has no local .env, so set these in Netlify →
# Site settings → Environment variables:
#   EXPO_PUBLIC_COURTS_URL, EXPO_PUBLIC_SUPABASE_URL, EXPO_PUBLIC_SUPABASE_ANON_KEY

[build]
  command = "npx expo export --platform web"
  publish = "dist"

# Single-page app: serve index.html for any path.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
